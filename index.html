<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>Sorteo de Puestos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: 'Inter', sans-serif; background: #000; margin: 0; overflow-x: hidden; }

    /* VIDEO FONDO — dos videos para crossfade sin negro */
    #video-background {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -2;
      /* Imagen de respaldo mientras carga el primer video — nunca negro */
      background: #1a1a2e url('https://cdn.pixabay.com/photo/2017/08/10/02/05/tiles-2617112_1280.jpg') center/cover no-repeat;
    }
    #video-background video {
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      opacity: 0; /* Empieza invisible — fade in cuando esté listo */
      transition: opacity 0.8s ease-in-out;
    }
    #video-background video.active {
      opacity: 1;
    }
    #video-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      background: rgba(0, 0, 0, 0.45);
    }

    /* GLASSMORPHISM */
    #raffle-section {
      background-color: rgba(255, 255, 255, 0.15) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255, 255, 255, 0.45) !important;
    }
    #assigned-section {
      background-color: rgba(255, 255, 255, 0.15) !important;
      backdrop-filter: blur(10px) !important;
      -webkit-backdrop-filter: blur(10px) !important;
      border: 1px solid rgba(255, 255, 255, 0.5) !important;
    }

    /* NÚMERO — naranja Itaú */
    .number-spinner { 
      font-weight: 900; 
      font-size: clamp(4rem, 20vw, 7rem); 
      color: #FF6200;
      line-height: 1;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      75% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .result-animation {
      animation: popIn 0.5s ease-out forwards;
    }

    .loader { border-top-color: #FF6200; animation: spinner 1s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Prevenir scroll horizontal */
    .main-container { width: 100% !important; max-width: 1100px !important; margin: 0 auto; }
  </style>
</head>
<body class="antialiased">

  <div id="video-background">
    <!-- Dos videos para crossfade real sin pantalla negra -->
    <video id="video-a" muted playsinline preload="auto"></video>
    <video id="video-b" muted playsinline preload="auto"></video>
  </div>
  <div id="video-overlay"></div>
  <canvas id="confetti-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100;"></canvas>

  <div class="main-container px-4 py-8 md:py-16 min-h-screen flex flex-col justify-start">
    
    <header class="text-center mb-8">
      <h1 class="font-black text-white text-4xl md:text-6xl drop-shadow-2xl uppercase tracking-tighter">
        Sorteo de Puestos
      </h1>
      <p class="text-white/90 text-lg font-bold drop-shadow-md">Cadena de Ahorro 2026</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full items-start">
      
      <!-- SECCIÓN SORTEO -->
      <div id="raffle-section" class="rounded-3xl p-6 md:p-10 shadow-2xl w-full" style="border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.25); padding:28px; min-height:560px; display:flex; flex-direction:column;">
        
        <h2 class="font-bold text-center flex items-center justify-center gap-2"
            style="font-size:clamp(0.9rem, 3.5vw, 1.2rem); line-height:1.4; margin-bottom:20px; color:#ffffff;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#ffffff; flex-shrink:0;"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
          ¡Ingresa tu primer nombre y da click al boton rosado!
        </h2>

        <div id="raffle-controls" style="display:flex; flex-direction:column; gap:14px;">
          <label for="nombre_completo" style="font-size:0.875rem; font-weight:500; color:#ffffff;">Primer Nombre</label>
          <input type="text" id="nombre_completo"
                 style="width:100%; padding:14px 16px; font-size:16px; border:1px solid #d1d5db; border-radius:8px; outline:none; box-sizing:border-box;"
                 placeholder="Escribe tu primer nombre">
          <button id="assignBtn"
                  style="width:100%; background-color:#ec4899; color:white; font-weight:700; padding:16px; font-size:16px; border-radius:8px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background 0.2s;"
                  onmouseover="this.style.backgroundColor='#db2777'"
                  onmouseout="this.style.backgroundColor='#ec4899'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.3a9 9 0 1 1-6.219-8.56"/><path d="M12 2v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="M2 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="M12 22v-4"/><path d="m19.07 19.07-2.83-2.83"/><path d="M22 12h-4"/><path d="m19.07 4.93-2.83 2.83"/></svg>
            <span id="btnText">Sortear mi puesto</span>
            <div id="btnLoader" class="hidden loader ease-linear rounded-full border-2 border-t-2 border-gray-200 h-6 w-6"></div>
          </button>
        </div>

        <div id="result-container"
             style="margin-top:20px; flex:1; min-height:200px; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f9fafb; border-radius:8px; padding:16px; border:2px dashed #e5e7eb; text-align:center;">
          <div id="spinner" class="number-spinner hidden">00</div>
          <div id="final-result" class="hidden">
            <p id="result-message" style="font-size:1.1rem; margin-bottom:8px; font-weight:bold; color:#374151;"></p>
            <p id="result-number" class="number-spinner result-animation my-4"></p>
            <p id="result-date" style="background:#FF6200; color:white; padding:8px 16px; border-radius:8px; font-weight:700; display:inline-block; margin-top:8px;"></p>
          </div>
          <p id="initial-message" style="color:#6b7280;">El resultado de tu sorteo aparecera aqui.</p>
        </div>

        <div id="alert-box" class="hidden" style="margin-top:16px; padding:14px 16px; border-radius:8px; font-size:0.875rem;"></div>

      </div>

      <!-- SECCIÓN TABLA -->
      <div id="assigned-section" class="rounded-3xl shadow-2xl w-full" style="border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.2); padding:28px; min-height:400px;">
        <h2 class="font-bold text-center flex items-center justify-center gap-2"
            style="font-size:clamp(0.9rem, 3.5vw, 1.2rem); line-height:1.4; margin-bottom:20px; color:#ffffff;">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Personas que Ya Sortearon
        </h2>
        <div style="overflow-y:auto; max-height:400px; border-radius:12px; border:1px solid #e5e7eb; overflow:hidden;">
          <table style="width:100%; border-collapse:collapse;">
            <thead style="background:rgba(249,250,251,0.9); position:sticky; top:0;">
              <tr>
                <th style="padding:10px 14px; text-align:left; font-size:0.7rem; font-weight:700; color:#000000; text-transform:uppercase; letter-spacing:0.05em;">Nombre</th>
                <th style="padding:10px 14px; text-align:center; font-size:0.7rem; font-weight:700; color:#000000; text-transform:uppercase; letter-spacing:0.05em;">No. de<br>Puesto</th>
                <th style="padding:10px 14px; text-align:left; font-size:0.7rem; font-weight:700; color:#000000; text-transform:uppercase; letter-spacing:0.05em;">Fecha de<br>Entrega</th>
              </tr>
            </thead>
            <tbody id="assigned-list" style="background:rgba(255,255,255,0.5);">
              <tr><td colspan="3" style="padding:24px; text-align:center; color:#6b7280;">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

<script>
  document.addEventListener('DOMContentLoaded', function() {

    const videoPlaylist = [
      "https://cdn.pixabay.com/video/2024/03/24/205412-926967116_large.mp4",
      "https://cdn.pixabay.com/video/2025/08/10/296524_large.mp4",
      "https://cdn.pixabay.com/video/2020/04/12/35774-408600310_large.mp4"
    ];

    const videoA = document.getElementById('video-a');
    const videoB = document.getElementById('video-b');

    let currentIndex = 0;
    let activeVideo = videoA;   // el que se ve
    let inactiveVideo = videoB; // el que espera en segundo plano

    // Carga y reproduce el primer video — fade in cuando tenga datos
    function startFirst() {
      activeVideo.src = videoPlaylist[0];
      activeVideo.load();
      activeVideo.addEventListener('canplay', function onCanPlay() {
        activeVideo.removeEventListener('canplay', onCanPlay);
        activeVideo.play().then(() => {
          activeVideo.classList.add('active'); // fade in
          prepareNext();
        }).catch(err => console.log('Autoplay prevented:', err));
      });
    }

    // Precarga el siguiente en el video inactivo
    function prepareNext() {
      const nextIndex = (currentIndex + 1) % videoPlaylist.length;
      inactiveVideo.src = videoPlaylist[nextIndex];
      inactiveVideo.load();
    }

    // Al terminar el activo, hace crossfade al inactivo (ya precargado)
    function onVideoEnded() {
      const nextIndex = (currentIndex + 1) % videoPlaylist.length;

      inactiveVideo.play().then(() => {
        // Fade in el nuevo, fade out el anterior — simultáneo = crossfade real
        inactiveVideo.classList.add('active');
        activeVideo.classList.remove('active');

        // Intercambiar roles
        const temp = activeVideo;
        activeVideo = inactiveVideo;
        inactiveVideo = temp;
        currentIndex = nextIndex;

        // Escuchar el fin del nuevo activo
        activeVideo.addEventListener('ended', onVideoEnded, { once: true });

        // Preparar el siguiente en segundo plano
        prepareNext();
      }).catch(err => console.log('Error on crossfade:', err));
    }

    // Arrancar
    videoA.addEventListener('ended', onVideoEnded, { once: true });
    startFirst();
  });

  window.addEventListener('load', function() {
    'use strict';

    const assignBtn = document.getElementById('assignBtn');
    const nameInput = document.getElementById('nombre_completo');
    const spinner = document.getElementById('spinner');
    const finalResultDiv = document.getElementById('final-result');
    const resultMessage = document.getElementById('result-message');
    const resultNumber = document.getElementById('result-number');
    const resultDate = document.getElementById('result-date');
    const initialMessage = document.getElementById('initial-message');
    const alertBox = document.getElementById('alert-box');
    const assignedListBody = document.getElementById('assigned-list');
    const btnText = document.getElementById('btnText');
    const btnLoader = document.getElementById('btnLoader');
    const raffleControls = document.getElementById('raffle-controls');
    const confettiCanvas = document.getElementById('confetti-canvas');
    const myConfetti = confetti.create(confettiCanvas, { resize: true, useWorker: true });

    let raffleInterval;
    const RAFFLE_DURATION = 3000;
    let maxRaffleNumber = 0;

    function triggerConfetti() {
      const duration = 5 * 1000;
      const animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0, scalar: 1.8 };
      function randomInRange(min, max) { return Math.random() * (max - min) + min; }
      const interval = setInterval(function() {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(interval);
        const particleCount = 50 * (timeLeft / duration);
        myConfetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
        myConfetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
      }, 250);
    }

    function showAlert(message, type = 'error') {
      alertBox.textContent = message;
      alertBox.style.display = 'block';
      if (type === 'success') {
        alertBox.style.backgroundColor = '#d1fae5';
        alertBox.style.color = '#065f46';
      } else {
        alertBox.style.backgroundColor = '#fee2e2';
        alertBox.style.color = '#991b1b';
      }
      alertBox.classList.remove('hidden');
    }

    function hideAlert() {
      alertBox.classList.add('hidden');
      alertBox.style.display = '';
    }

    function setButtonLoading(isLoading) {
      assignBtn.disabled = isLoading;
      btnText.classList.toggle('hidden', isLoading);
      btnLoader.classList.toggle('hidden', !isLoading);
    }

    function formatDate(dateString) {
      if (!dateString) return 'Fecha inválida';
      try {
        const dateObj = new Date(dateString);
        const options = { year: 'numeric', month: 'long', day: 'numeric', timeZone: 'UTC' };
        return dateObj.toLocaleDateString('es-ES', options);
      } catch (e) {
        return 'Error en fecha';
      }
    }

    function displayFinalResult(result) {
      clearInterval(raffleInterval);
      spinner.classList.add('hidden');
      setButtonLoading(false);

      if (!result) {
        showAlert('Error: No se recibió una respuesta válida del servidor.');
        initialMessage.classList.remove('hidden');
        return;
      }

      if (result.puesto && result.fechaEntrega) {
        const fechaFormatted = formatDate(result.fechaEntrega);
        if (result.success) {
          // Sorteo exitoso — primera vez
          resultMessage.textContent = '¡Felicidades, ' + result.nombre + '! Tu puesto es el:';
          triggerConfetti();
        } else {
          // Ya tenía puesto asignado
          resultMessage.textContent = '⚠️ ' + result.nombre + ', ya sorteaste anteriormente. Tu puesto es el:';
        }
        resultNumber.textContent = result.puesto;
        resultDate.textContent = 'Entrega: ' + fechaFormatted;
        finalResultDiv.classList.remove('hidden');
        raffleControls.style.display = 'none';
        setTimeout(updateAssignedList, 500);
      } else {
        let message = result.message || 'Ocurrió un error desconocido.';
        showAlert(message);
        initialMessage.classList.remove('hidden');
      }
    }

    function handleServerResponse(result, startTime) {
      const elapsedTime = Date.now() - startTime;
      const remainingTime = Math.max(0, RAFFLE_DURATION - elapsedTime);
      setTimeout(() => displayFinalResult(result), remainingTime);
    }

    function handleServerError(error, startTime) {
      const elapsedTime = Date.now() - startTime;
      const remainingTime = Math.max(0, RAFFLE_DURATION - elapsedTime);
      setTimeout(() => {
        clearInterval(raffleInterval);
        spinner.classList.add('hidden');
        initialMessage.classList.remove('hidden');
        setButtonLoading(false);
        showAlert('Error de comunicación con el servidor: ' + error.message);
      }, remainingTime);
    }

    function startRaffle() {
      const nombreCompleto = nameInput.value.trim();
      if (!nombreCompleto) {
        showAlert('Por favor, ingresa tu primer nombre.');
        return;
      }
      if (maxRaffleNumber <= 0) {
        showAlert('No se pudo determinar el número de participantes. Recarga la página.');
        return;
      }
      hideAlert();
      setButtonLoading(true);
      finalResultDiv.classList.add('hidden');
      initialMessage.classList.add('hidden');
      spinner.classList.remove('hidden');

      const startTime = Date.now();
      raffleInterval = setInterval(() => {
        const randomNum = Math.floor(Math.random() * maxRaffleNumber) + 1;
        spinner.textContent = String(randomNum).padStart(2, '0');
      }, 80);

      google.script.run
        .withSuccessHandler(result => handleServerResponse(result, startTime))
        .withFailureHandler(error => handleServerError(error, startTime))
        .assignPuesto(nombreCompleto);
    }

    function resetRaffle() {
      finalResultDiv.classList.add('hidden');
      resetBtn.style.display = 'none';
      hideAlert();
      raffleControls.style.display = '';
      initialMessage.classList.remove('hidden');
      nameInput.value = '';
      nameInput.focus();
    }

    function populateAssignedTable(assignedPuestos) {
      assignedListBody.innerHTML = '';
      if (assignedPuestos && Array.isArray(assignedPuestos) && assignedPuestos.length > 0) {
        assignedPuestos.forEach(item => {
          const fechaFormateada = formatDate(item.fechaEntrega);
          const row = assignedListBody.insertRow();
          row.style.borderBottom = '1px solid #e5e7eb';
          row.innerHTML = `
            <td style="padding:12px 14px; white-space:nowrap;"><div style="font-size:0.875rem; color:#1f2937; font-weight:600;">${item.nombre || 'Sin nombre'}</div></td>
            <td style="padding:12px 14px; white-space:nowrap; text-align:center;"><div style="font-size:0.875rem; font-weight:700; color:#000000;">${item.puesto || '?'}</div></td>
            <td style="padding:12px 14px;"><div style="font-size:0.875rem; color:#000000; white-space:normal; min-width:90px;">${fechaFormateada}</div></td>`;
        });
      } else {
        assignedListBody.innerHTML = '<tr><td colspan="3" style="padding:24px; text-align:center; color:#6b7280;">Nadie ha sorteado su puesto aún.</td></tr>';
      }
    }

    function updateAssignedList() {
      assignedListBody.innerHTML = '<tr><td colspan="3" style="padding:24px; text-align:center;"><div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8" style="margin:0 auto;"></div></td></tr>';
      google.script.run
        .withSuccessHandler(populateAssignedTable)
        .withFailureHandler(err => {
          showAlert('Error al cargar la lista de participantes.');
          assignedListBody.innerHTML = `<tr><td colspan="3" style="padding:24px; text-align:center; color:#dc2626;">Error al cargar la lista.</td></tr>`;
        })
        .getAssignedPuestos();
    }

    function initializeApp() {
      google.script.run
        .withSuccessHandler(count => {
          maxRaffleNumber = Number(count) || 0;
          updateAssignedList();
        })
        .withFailureHandler(err => {
          showAlert('Error al conectar con la hoja de cálculo.');
        })
        .getTotalParticipantsCount();
    }

    assignBtn.addEventListener('click', startRaffle);
    nameInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') { e.preventDefault(); startRaffle(); }
    });

    function attemptInitialization() {
      try {
        if (google && google.script && google.script.run) {
          initializeApp();
        } else {
          setTimeout(attemptInitialization, 100);
        }
      } catch (e) {
        setTimeout(attemptInitialization, 100);
      }
    }

    attemptInitialization();
  });
</script>
</body>
</html>
